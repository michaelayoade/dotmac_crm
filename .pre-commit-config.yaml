repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: poetry run ruff check --fix
        language: system
        files: ^(app|tests)/.*\.py$
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: poetry run ruff format
        language: system
        files: ^(app|tests)/.*\.py$
        types: [python]

      - id: mypy
        name: mypy
        entry: poetry run mypy app/
        language: system
        files: ^app/.*\.py$
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: poetry run bandit -r app -q
        language: system
        files: ^app/.*\.py$
        pass_filenames: false
