<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Tracking unavailable · {{ branding.company_name | default('Service', true) }}</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="h-full bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-white font-body">
  <div class="min-h-full flex items-center justify-center px-4">
    <div class="max-w-md w-full rounded-2xl bg-white dark:bg-slate-800 border border-slate-200/70 dark:border-slate-700/60 p-8 text-center shadow-sm">
      <span class="mx-auto inline-flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-700 text-slate-400" aria-hidden="true">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0 3.75h.008M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </span>
      <h1 class="mt-4 font-display text-xl font-bold">Tracking unavailable</h1>
      <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">{{ message | default('This tracking link is not available.', true) }}</p>
      <p class="mt-4 text-xs text-slate-400">Need help? Reply to your appointment message and our team will assist.</p>
    </div>
  </div>
</body>
</html>
