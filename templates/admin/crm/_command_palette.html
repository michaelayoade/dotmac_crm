<div x-show="showCommandPalette"
     x-cloak
     x-transition
     class="fixed inset-0 z-[80] bg-slate-900/55 backdrop-blur-sm"
     @click.self="closeCommandPalette()">
    <div class="mx-auto mt-20 w-[92%] max-w-2xl overflow-hidden rounded-2xl border border-slate-200/70 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-900">
        <div class="border-b border-slate-200/70 px-4 py-3 dark:border-slate-700">
            <input id="inbox-command-palette-input"
                   x-model="commandQuery"
                   type="text"
                   placeholder="Type a command…"
                   class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:border-amber-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-amber-500/20 dark:border-slate-700 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500">
        </div>
        <div class="max-h-[22rem] overflow-y-auto py-2">
            <template x-for="action in filteredCommandActions()" :key="action.id">
                <button type="button"
                        @click="runCommand(action.id)"
                        class="flex w-full items-center justify-between px-4 py-2.5 text-left hover:bg-slate-50 dark:hover:bg-slate-800/70">
                    <div>
                        <div class="text-sm font-semibold text-slate-800 dark:text-slate-100" x-text="action.label"></div>
                        <div class="text-[11px] text-slate-500 dark:text-slate-400" x-text="action.hint || ''"></div>
                    </div>
                    <span class="text-[10px] font-semibold uppercase tracking-wide text-slate-400 dark:text-slate-500" x-text="action.group || ''"></span>
                </button>
            </template>
            <div x-show="filteredCommandActions().length === 0"
                 class="px-4 py-6 text-center text-xs text-slate-500 dark:text-slate-400">
                No matching commands
            </div>
        </div>
    </div>
</div>
