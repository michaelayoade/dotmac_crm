name: CI

# Run once per change: on PRs, and on pushes to main (merges). Previously this
# triggered on every push AND every pull_request, so each PR commit ran CI twice.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref so a new push doesn't queue behind a
# stale one (frees the runner pool and speeds feedback).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache Poetry artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: pypoetry-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            pypoetry-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry==2.3.1
          poetry config virtualenvs.create false

      - name: Install Dependencies
        run: |
          poetry install --no-interaction --no-ansi

      - name: Ruff Lint
        run: poetry run ruff check app/ tests/

      - name: Ruff Format Diff
        run: poetry run ruff format --diff tests/test_ai_intake_service.py || true

      - name: Ruff Format Check
        run: poetry run ruff format --check app/ tests/

      - name: Mypy
        run: poetry run mypy app/

      - name: Bandit
        run: poetry run bandit -r app -ll --skip B113

      - name: Pytest (Coverage)
        run: poetry run pytest --cov=app --cov-report=term-missing --cov-report=xml
