name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry==2.3.1
          poetry config virtualenvs.create false

      - name: Install Dependencies
        run: |
          poetry install --no-interaction --no-ansi

      - name: Ruff Lint
        run: poetry run ruff check app/ tests/

      - name: Ruff Format Check
        run: poetry run ruff format --check app/ tests/

      - name: Mypy
        run: poetry run mypy app/

      - name: Bandit
        run: poetry run bandit -r app -ll --skip B113

  pytest:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        shard-index: [0, 1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry==2.3.1
          poetry config virtualenvs.create false

      - name: Install Dependencies
        run: |
          poetry install --no-interaction --no-ansi

      - name: Build pytest shard file list
        run: |
          python scripts/ci_test_shard.py ${{ matrix.shard-index }} 4 > /tmp/pytest-shard.txt
          wc -l /tmp/pytest-shard.txt

      - name: Pytest shard ${{ matrix.shard-index }}
        run: |
          xargs -a /tmp/pytest-shard.txt poetry run pytest -q

  coverage:
    runs-on: ubuntu-latest
    needs: pytest
    continue-on-error: true
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry==2.3.1
          poetry config virtualenvs.create false

      - name: Install Dependencies
        run: |
          poetry install --no-interaction --no-ansi

      - name: Pytest (Coverage)
        run: poetry run pytest --cov=app --cov-report=xml --cov-report=

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
